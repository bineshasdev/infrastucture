# Kong Declarative Configuration for FlowCore
# ==========================================================
# This file defines all services, routes, and plugins for the
# FlowCore API Gateway using Kong's DB-less (declarative) mode.
# ==========================================================
_format_version: "3.0"
_transform: true

# ==========================================================
# Consumers
# ==========================================================
# anonymous — used as a fallback identity for passthrough routes
# (Supabase auth/storage handle their own token validation)
consumers:
  - username: anonymous
    id: 00000000-0000-0000-0000-000000000001

  # Keycloak realm — holds the RS256 public key for all tokens
  # issued by this realm (authorization code flow or otherwise).
  #
  # Get the public key (base64-encoded DER) then wrap it in PEM:
  #   curl -s http://localhost:9080/realms/master | jq -r '.public_key'
  # Paste the output between the PEM headers below.
  - username: keycloak-realm
    id: 00000000-0000-0000-0000-000000000002
    jwt_secrets:
      - key: http://localhost:9080/realms/master   # must match 'iss' in the JWT
        algorithm: RS256
        rsa_public_key: |
          -----BEGIN PUBLIC KEY-----
          
          -----END PUBLIC KEY-----

# ==========================================================
# Services — one per FlowCore microservice
# ==========================================================

services:

  # --- CORE LAYER ---

  # 🟠 Platform Service (Config, Menu, Theme, Lookups, Settings, Bootstrap)
  - name: platform-service
    url: http://host.containers.internal:8083
    connect_timeout: 5000
    read_timeout: 30000
    retries: 2
    routes:
      - name: platform-bootstrap
        paths: ["/api/v1/bootstrap"]
        strip_path: false
        preserve_host: true
      - name: platform-menu
        paths: ["/api/v1/menu"]
        strip_path: false
        preserve_host: true
      - name: platform-theme
        paths: ["/api/v1/theme"]
        strip_path: false
        preserve_host: true
      - name: platform-lookups
        paths: ["/api/v1/lookups"]
        strip_path: false
        preserve_host: true
      - name: platform-settings
        paths: ["/api/v1/settings"]
        strip_path: false
        preserve_host: true

  # 🔵 Tenant Service (Tenants, Users, Billing, Subscriptions)
  - name: tenant-service
    url: http://host.containers.internal:8082
    connect_timeout: 5000
    read_timeout: 30000
    retries: 2
    routes:
      - name: tenant-account
        paths: ["/api/v1/account"]
        strip_path: false
        preserve_host: true
      - name: tenant-subscription
        paths: ["/api/v1/subscription"]
        strip_path: false
        preserve_host: true
      - name: tenant-billing
        paths: ["/api/v1/billing"]
        strip_path: false
        preserve_host: true
      - name: tenant-users
        paths: ["/api/v1/users"]
        strip_path: false
        preserve_host: true
      - name: tenant-email-verification
        paths: ["/api/v1/email-verification"]
        strip_path: false
        preserve_host: true

  # 🟢 Document Service (Documents, Search, Reports)
  - name: document-service
    url: http://host.containers.internal:8083
    connect_timeout: 5000
    read_timeout: 60000
    retries: 1
    routes:
      - name: documents
        paths: ["/api/v1/documents"]
        strip_path: false
        preserve_host: true
      - name: search
        paths: ["/api/v1/search"]
        strip_path: false
        preserve_host: true
      - name: reports
        paths: ["/api/v1/reports"]
        strip_path: false
        preserve_host: true

  # 🟡 Workflow Service (Workflows, Approvals, Rules)
  - name: workflow-service
    url: http://host.containers.internal:8084
    connect_timeout: 5000
    read_timeout: 30000
    retries: 2
    routes:
      - name: workflows
        paths: ["/api/v1/workflows"]
        strip_path: false
        preserve_host: true

  # 🔴 Notification Service (Email, Push, In-App, SMS)
  - name: notification-service
    url: http://host.containers.internal:8085
    connect_timeout: 5000
    read_timeout: 15000
    retries: 2
    routes:
      - name: notifications
        paths: ["/api/v1/notifications"]
        strip_path: false
        preserve_host: true

  # --- PLUGGABLE LAYER ---

  # 🟣 AI Service (OCR, Classification, Extraction, Validation)
  - name: ai-service
    url: http://host.containers.internal:8086
    connect_timeout: 5000
    read_timeout: 120000    # AI processing can be slow
    retries: 0              # Don't retry AI jobs
    routes:
      - name: ai
        paths: ["/api/v1/ai"]
        strip_path: false
        preserve_host: true

  # 🔗 Integration Service (Webhooks, Connectors, ERP/CRM)
  - name: integration-service
    url: http://host.containers.internal:8087
    connect_timeout: 5000
    read_timeout: 30000
    retries: 2
    routes:
      - name: integrations
        paths: ["/api/v1/integrations"]
        strip_path: false
        preserve_host: true
 

# ==========================================================
# Plugins — global and per-service
# ==========================================================

plugins:

  # Global CORS
  - name: cors
    config:
      origins: ["http://localhost:3001", "http://127.0.0.1:3001"]
      methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
      headers: ["Authorization", "Content-Type", "X-Tenant-ID", "X-App-API-Key", "X-Request-ID"]
      exposed_headers: ["X-Request-ID"]
      credentials: true
      max_age: 3600

  # Global rate limiting (per consumer IP)
  - name: rate-limiting
    config:
      minute: 200
      hour: 5000
      policy: local
      fault_tolerant: true
      hide_client_headers: false

  # Global request ID for tracing
  - name: correlation-id
    config:
      header_name: X-Request-ID
      generator: uuid
      echo_downstream: true

  # Cache GET responses for lookups and config (5 min)
  - name: proxy-cache
    service: platform-service
    config:
      response_code: [200]
      request_method: ["GET"]
      content_type: ["application/json"]
      cache_ttl: 300
      strategy: memory
      memory:
        dictionary_name: kong_db_cache


  # Stricter rate limit on AI (expensive operations)
  - name: rate-limiting
    service: ai-service
    config:
      minute: 20
      hour: 500
      policy: local
      fault_tolerant: true

  # Request size limit for document uploads (50MB)
  - name: request-size-limiting
    service: document-service
    config:
      allowed_payload_size: 50
      size_unit: megabytes

  # ==========================================================
  # JWT Validation — free Kong OSS plugins
  # ==========================================================
  #
  # How it works:
  #   1. Kong reads the 'iss' claim from the Bearer token and
  #      matches it to the keycloak-realm consumer credential.
  #   2. The RS256 signature is verified locally against the
  #      registered public key — no round-trip to Keycloak.
  #   3. exp and nbf claims are verified.
  #   4. The pre-function plugin (runs in rewrite phase, before
  #      jwt validation) strips any client-forged X-Authenticated-*
  #      headers and injects real values decoded from the JWT
  #      payload, so upstream Spring services receive the same
  #      identity headers they relied on previously.
  #   5. The original Authorization: Bearer <token> header is
  #      preserved so Spring Security can do its own role/tenant
  #      checks without re-reading the raw token.
  #
  # Setup:
  #   curl -s http://localhost:9080/realms/master | jq -r '.public_key'
  #   Paste the result (as-is, no PEM headers needed) into the
  #   keycloak-realm consumer's rsa_public_key above.
  # ==========================================================

  # ── Global JWT validation — protects all /api/v1/* routes ──
  - name: jwt
    config:
      key_claim_name: iss          # use 'iss' to look up the consumer credential
      claims_to_verify:
        - exp
        - nbf
      header_names:
        - authorization
      secret_is_base64: false

  # ── Inject X-Authenticated-* headers from JWT payload ───────
  # Runs in the rewrite phase (before the jwt access-phase
  # check). Strips client-provided headers first to prevent
  # spoofing, then sets them from the decoded JWT payload.
  # If the token is missing or invalid the jwt plugin rejects
  # the request with 401 and upstream never receives these.
  - name: pre-function
    config:
      rewrite:
        - |
          -- strip any client-forged headers before setting real values
          kong.service.request.clear_header("X-Authenticated-UserID")
          kong.service.request.clear_header("X-Authenticated-Email")
          kong.service.request.clear_header("X-Authenticated-Username")
          kong.service.request.clear_header("X-Authenticated-Client")
          kong.service.request.clear_header("X-Org-ID")
          kong.service.request.clear_header("X-Org-Name")

          local auth = kong.request.get_header("authorization")
          if not auth then return end
          local token = auth:match("^[Bb]earer (.+)$")
          if not token then return end

          -- extract the second JWT segment (payload)
          local payload_b64 = token:match("^[^.]+%.([^.]+)%.")
          if not payload_b64 then return end

          -- base64url → base64
          payload_b64 = payload_b64:gsub("-", "+"):gsub("_", "/")
          local pad = #payload_b64 % 4
          if pad == 2 then payload_b64 = payload_b64 .. "=="
          elseif pad == 3 then payload_b64 = payload_b64 .. "=" end

          local ok, claims = pcall(
            require("cjson").decode,
            ngx.decode_base64(payload_b64)
          )
          if not ok or type(claims) ~= "table" then return end

          if claims.sub then
            kong.service.request.set_header("X-Authenticated-UserID", claims.sub)
          end
          if claims.email then
            kong.service.request.set_header("X-Authenticated-Email", claims.email)
          end
          if claims.preferred_username then
            kong.service.request.set_header("X-Authenticated-Username", claims.preferred_username)
          end
          if claims.azp then
            kong.service.request.set_header("X-Authenticated-Client", claims.azp)
          end

          -- Keycloak 26+ organization claim:
          -- "organization": { "<alias>": { "id": "<uuid>" } }
          -- alias = org name/slug, id = Keycloak org UUID (maps to Tenant.tenantId)
          if type(claims.organization) == "table" then
            local org_name, org_details = next(claims.organization)
            if org_name then
              kong.service.request.set_header("X-Org-Name", org_name)
            end
            if type(org_details) == "table" and org_details.id then
              kong.service.request.set_header("X-Org-ID", org_details.id)
            end
          end
 
