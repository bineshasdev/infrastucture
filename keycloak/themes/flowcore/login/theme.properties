# FlowCore login theme
# parent=keycloak gives access to built-in i18n message bundles.
# We override template.ftl and login.ftl entirely so no PatternFly CSS is used.
parent=keycloak

# Do NOT inherit PatternFly / Keycloak stylesheets.
styles=css/styles.css

# Custom properties referenced in template.ftl / login.ftl
flowcoreAppName=FlowCore
kcLogoLink=http://localhost:3000
