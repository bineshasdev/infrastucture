# FlowCore login theme — extends the built-in Keycloak theme and layers
# custom branding on top.
parent=keycloak
import=common/keycloak

# Append our stylesheet after Keycloak's defaults so overrides win.
styles+=css/styles.css

# Custom properties referenced in login.ftl
flowcoreAppName=FlowCore
kcLogoLink=http://localhost:9080
