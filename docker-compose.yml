# FlowCore — Infrastructure Stack (Podman Compose)
# Run: podman-compose -f infrastructure/docker-compose.yml up -d
#
# Services:  postgres · adminer · keycloak · kafka · consul · kong
# Single PostgreSQL instance; databases created via init script:
#   - keycloak        (Keycloak identity store)
#   - platform_service (platform-service)

services:

  # ── PostgreSQL ────────────────────────────────────────────────────
  postgres:
    image: docker.io/library/postgres:17
    container_name: flowcore-postgres
    environment:
      POSTGRES_USER: flowcore
      POSTGRES_PASSWORD: flowcore_secret
      POSTGRES_DB: flowcore        # default db; per-service dbs created by init script
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowcore"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Adminer (DB GUI) ──────────────────────────────────────────────
  adminer:
    image: docker.io/library/adminer:4
    container_name: flowcore-adminer
    ports:
      - "8090:8080"             # http://localhost:8090
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Keycloak ──────────────────────────────────────────────────────
  keycloak:
    image: docker.io/keycloak/keycloak:26.1
    container_name: flowcore-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: flowcore
      KC_DB_PASSWORD: flowcore_secret
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 9080
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "9080:9080"             # Admin console: http://localhost:9080/admin
    volumes:
      - ./keycloak/themes/flowcore:/opt/keycloak/themes/flowcore:ro,Z
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9080/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ── Kong ─────────────────────────────────────────────────────────
  kong:
    image: docker.io/kong/kong-gateway:3.9
    container_name: flowcore-kong
    environment:
      # DB-less declarative mode
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      # Proxy listens on 8000 (HTTP) and 8443 (HTTPS)
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      # Admin API on 8001 (local only)
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_ADMIN_GUI_URL: "http://localhost:8002"
      # Logging
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      # DNS to resolve host.containers.internal
      KONG_DNS_RESOLVER: ""
    ports:
      - "8000:8000"     # Proxy (all API traffic goes here)
      - "8443:8443"     # Proxy SSL
      - "8001:8001"     # Admin API
      - "8002:8002"     # Kong Manager GUI
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro,Z
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  kafka:
    image: docker.io/apache/kafka:3.9.0
    container_name: flowcore-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  consul:
    image: docker.io/hashicorp/consul:1.20
    container_name: flowcore-consul
    command: agent -dev -client=0.0.0.0
    environment:
      CONSUL_BIND_INTERFACE: eth0
    ports:
      - "8500:8500"   # HTTP API & UI
      - "8600:8600/udp" # DNS
    volumes:
      - consul-data:/consul/data
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres-data:
  kafka-data:
  consul-data:
