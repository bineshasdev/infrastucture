# FlowCore — Infrastructure Stack (Podman Compose)
# Run: podman-compose -f infrastructure/docker-compose.yml up -d
#
# Services:  postgres · adminer · keycloak · kafka · kafka-ui · consul
# Single PostgreSQL instance; databases created via init script:
#   - keycloak        (Keycloak identity store)
#   - platform_service (platform-service)

services:

  # ── PostgreSQL ────────────────────────────────────────────────────
  postgres:
    image: docker.io/library/postgres:17
    container_name: flowcore-postgres
    environment:
      POSTGRES_USER: flowcore
      POSTGRES_PASSWORD: flowcore_secret
      POSTGRES_DB: flowcore
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro,Z
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowcore"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Adminer (DB GUI) ──────────────────────────────────────────────
  adminer:
    image: docker.io/library/adminer:4
    container_name: flowcore-adminer
    ports:
      - "8090:8080"             # http://localhost:8090
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    deploy:
      resources:
        limits:
          memory: 64m
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Keycloak ──────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: flowcore-keycloak
    command: start-dev --features=organization
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: flowcore
      KC_DB_PASSWORD: flowcore_secret
      KC_METRICS_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: "http://localhost:9080"
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
     # Fixed heap — prevents OOM during Quarkus build phase
     # JAVA_OPTS_APPEND: >-
     #  -Xms192m -Xmx384m
     # -XX:MetaspaceSize=64m -XX:MaxMetaspaceSize=192m
     # -Djava.net.preferIPv4Stack=true
    ports:
      - "9080:8080"
      - "9000:9000"
    volumes:
      - ./keycloak/themes/flowcore:/opt/keycloak/themes/flowcore:ro,Z
    deploy:
      resources:
        limits:
          memory: 768m
        reservations:
          memory: 384m
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  # ── Kafka ─────────────────────────────────────────────────────────
  kafka:
    image: docker.io/apache/kafka:3.9.0
    container_name: flowcore-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_HEAP_OPTS: "-Xms128m -Xmx256m"
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 384m
        reservations:
          memory: 192m
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Kafka UI ──────────────────────────────────────────────────────
  kafka-ui:
    image: docker.io/provectuslabs/kafka-ui:latest
    container_name: flowcore-kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: flowcore
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    ports:
      - "8085:8080"             # http://localhost:8085
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ── Consul ────────────────────────────────────────────────────────
  consul:
    image: docker.io/hashicorp/consul:1.20
    container_name: flowcore-consul
    command: agent -dev -client=0.0.0.0
    environment:
      CONSUL_BIND_INTERFACE: eth0
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    volumes:
      - consul-data:/consul/data
    deploy:
      resources:
        limits:
          memory: 128m
        reservations:
          memory: 64m
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  kafka-data:
  consul-data:
  postgres-data:
